name: Release
on: { push: { tags: ["v*"] } }

# The binaries job creates/updates a GitHub Release, which needs write access
# to repository contents (the default GITHUB_TOKEN is read-only otherwise).
permissions:
  contents: write

jobs:
  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # Idempotent: succeed if this version is already on crates.io so the
      # release can be re-run (e.g. to (re)build binaries) without failing here.
      - name: Publish keylight to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          out=$(cargo publish -p keylight 2>&1); code=$?
          echo "$out"
          if [ $code -eq 0 ]; then exit 0; fi
          echo "$out" | grep -qiE "already (exists|uploaded)" && { echo "already on crates.io — skipping"; exit 0; }
          exit $code
  binaries:
    needs: crates
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p keylight-cli --release
      # Rename to a target-suffixed name so the three platforms don't collide,
      # and upload only the executable (not the .d/.pdb build artifacts).
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/keylight${{ matrix.ext }}" "dist/keylight-${{ matrix.target }}${{ matrix.ext }}"
      - uses: softprops/action-gh-release@v2
        with: { files: "dist/keylight-${{ matrix.target }}*" }
