name: Release
on: { push: { tags: ["v*"] } }
jobs:
  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p keylight --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
  binaries:
    needs: crates
    strategy: { matrix: { os: [macos-latest, ubuntu-latest, windows-latest] } }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p keylight-cli --release
      - uses: softprops/action-gh-release@v2
        with: { files: "target/release/keylight*" }
