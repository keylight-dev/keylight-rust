name: Release
on: { push: { tags: ["v*"] } }

# The binaries job creates/updates a GitHub Release, which needs write access
# to repository contents (the default GITHUB_TOKEN is read-only otherwise).
permissions:
  contents: write

jobs:
  crates:
    runs-on: ubuntu-latest
    # OIDC "trusted publishing" for crates.io — no long-lived token. Requires a
    # trusted publisher configured for BOTH keylight and tauri-plugin-keylight on
    # crates.io (GitHub repo keylight-dev/keylight-rust, workflow release.yml).
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # tauri-plugin-keylight pulls in `tauri`, whose verify-build needs these.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Authenticate to crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      # Idempotent publish: succeed if the version is already on crates.io so the
      # release can be safely re-run. keylight must publish before the plugin that
      # depends on it.
      - name: Publish keylight to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set +e
          out=$(cargo publish -p keylight 2>&1); code=$?
          echo "$out"
          [ $code -eq 0 ] && exit 0
          echo "$out" | grep -qiE "already (exists|uploaded)" && { echo "already on crates.io"; exit 0; }
          exit $code
      - name: Publish tauri-plugin-keylight to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          sleep 30 # let the keylight release propagate to the index
          set +e
          out=$(cargo publish -p tauri-plugin-keylight 2>&1); code=$?
          echo "$out"
          [ $code -eq 0 ] && exit 0
          echo "$out" | grep -qiE "already (exists|uploaded)" && { echo "already on crates.io"; exit 0; }
          exit $code
  npm:
    runs-on: ubuntu-latest
    # OIDC "trusted publisher": no long-lived NPM_TOKEN in the repo. Requires a
    # trusted publisher to be configured for tauri-plugin-keylight-api on npmjs.com
    # (provider: GitHub Actions, repo: keylight-dev/keylight-rust, workflow: release.yml).
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # OIDC trusted publishing wants a recent Node/npm
          registry-url: "https://registry.npmjs.org"
      # NOTE: tauri-plugin-keylight-api is UNSCOPED, so it is NOT affected by
      # npm/cli#8678 (OIDC 404 on a SCOPED package's subsequent versions — that bug
      # blocked @keylight-dev/js@0.1.1's CI publish). If npm OIDC ever 404s here
      # anyway, publish manually: `cd tauri-plugin-keylight && npm publish --access
      # public` from a logged-in terminal (passkey 2FA → browser auth, no --otp).
      - name: Publish tauri-plugin-keylight-api to npm
        working-directory: tauri-plugin-keylight
        run: |
          npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
          npm ci
          # Idempotent: succeed if this version is already published.
          if npm publish --access public 2>publish.err; then
            echo "published"
          elif grep -qiE "cannot publish over|previously published|already exists" publish.err; then
            cat publish.err; echo "already on npm"
          else
            cat publish.err; exit 1
          fi
  binaries:
    needs: crates
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p keylight-cli --release
      # Rename to a target-suffixed name so the three platforms don't collide,
      # and upload only the executable (not the .d/.pdb build artifacts).
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/keylight${{ matrix.ext }}" "dist/keylight-${{ matrix.target }}${{ matrix.ext }}"
      - uses: softprops/action-gh-release@v2
        with: { files: "dist/keylight-${{ matrix.target }}*" }
